<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DISPATCH</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #1c1a16;
    --paper-raised: #26231d;
    --ink: #e9e0c8;
    --ink-dim: #a89f88;
    --rule: #3a362c;
    --signal: #c1502f;
    --signal-dim: #7a3521;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'IBM Plex Mono', 'Courier New', monospace;
    padding: 0 0 60px;
    min-height: 100vh;
  }
  header {
    padding: 32px 20px 20px;
    border-bottom: 1px solid var(--rule);
  }
  header h1 {
    font-family: 'Space Mono', monospace;
    font-size: 15px;
    letter-spacing: 0.32em;
    margin: 0 0 6px;
    color: var(--ink);
  }
  header p {
    margin: 0;
    font-size: 12px;
    color: var(--ink-dim);
    letter-spacing: 0.02em;
  }
  .dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--signal);
    margin-right: 8px;
    animation: pulse 2.4s ease-in-out infinite;
  }
  @media (prefers-reduced-motion: reduce) { .dot { animation: none; } }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }
  main {
    max-width: 640px;
    margin: 0 auto;
    padding: 24px 16px 0;
  }
  .card {
    background: var(--paper-raised);
    border: 1px solid var(--rule);
    padding: 20px 18px;
    margin-bottom: 20px;
  }
  .card-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 14px;
  }
  .card-head h2 {
    font-family: 'Space Mono', monospace;
    font-size: 16px;
    margin: 0;
    letter-spacing: 0.02em;
  }
  .count {
    font-size: 12px;
    color: var(--ink-dim);
  }
  .count b { color: var(--ink); font-weight: 500; }
  .meter {
    height: 6px;
    background: var(--rule);
    margin-bottom: 14px;
    position: relative;
    overflow: hidden;
  }
  .meter-fill {
    height: 100%;
    background: var(--signal);
    transition: width 0.4s ease;
  }
  .next {
    font-size: 13px;
    color: var(--ink);
    margin-bottom: 4px;
  }
  .next .label { color: var(--ink-dim); }
  .next-detail {
    font-size: 12px;
    color: var(--ink-dim);
    margin-bottom: 14px;
  }
  .history {
    border-top: 1px solid var(--rule);
    padding-top: 12px;
    margin-top: 4px;
  }
  .history-title {
    font-size: 10px;
    letter-spacing: 0.14em;
    color: var(--ink-dim);
    margin-bottom: 8px;
  }
  .history-row {
    display: flex;
    gap: 10px;
    font-size: 12px;
    line-height: 1.8;
    color: var(--ink-dim);
  }
  .history-row .when { flex-shrink: 0; color: var(--signal-dim); }
  .history-row .what {
    color: var(--ink);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .empty-note {
    font-size: 12px;
    color: var(--ink-dim);
    font-style: italic;
  }
  .live-tag {
    display: inline-flex;
    align-items: center;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--signal);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .live-tag.not-live {
    color: var(--ink-dim);
  }
  .live-tag.not-live .dot { display: none; }
  .actions {
    display: flex;
    gap: 10px;
    margin: 4px 0 8px;
  }
  .action-btn {
    background: none;
    border: 1px solid var(--rule);
    color: var(--ink);
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 0.04em;
    padding: 7px 12px;
    cursor: pointer;
  }
  .action-btn:hover { border-color: var(--signal); }
  .action-btn:disabled { opacity: 0.5; cursor: default; }
  .action-btn.start-btn {
    border-color: var(--signal-dim);
    color: var(--signal);
  }
  .action-result {
    font-size: 11px;
    color: var(--ink-dim);
    min-height: 14px;
    margin-bottom: 10px;
    word-break: break-word;
  }
  .action-result.ok { color: var(--ink); }
  .action-result.err { color: var(--signal); }
  .refresh-line {
    text-align: center;
    font-size: 11px;
    color: var(--ink-dim);
    padding: 20px 0 0;
  }
  .refresh-line button {
    background: none;
    border: 1px solid var(--rule);
    color: var(--ink);
    font-family: inherit;
    font-size: 11px;
    padding: 6px 14px;
    cursor: pointer;
  }
  .refresh-line button:hover { border-color: var(--signal); }
  .error-banner {
    background: var(--paper-raised);
    border: 1px solid var(--signal-dim);
    padding: 14px 16px;
    font-size: 12px;
    color: var(--ink-dim);
    margin-bottom: 20px;
  }
  .duration-line {
    font-size: 11px;
    color: var(--ink-dim);
    margin: 2px 0 12px;
    line-height: 1.6;
  }
  .est-tag {
    border: 1px solid var(--rule);
    padding: 1px 5px;
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--ink-dim);
  }
  .queue {
    border-top: 1px solid var(--rule);
    padding-top: 12px;
    margin-top: 4px;
    margin-bottom: 12px;
  }
  .queue-row {
    display: flex;
    gap: 10px;
    font-size: 12px;
    line-height: 1.8;
    color: var(--ink-dim);
  }
  .queue-row.first .what { color: var(--ink); }
  .q-when {
    flex-shrink: 0;
    width: 52px;
    color: var(--signal-dim);
  }
  .queue-row .what, .item-row .what {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--ink-dim);
  }
  .full-list-toggle { margin-top: 12px; }
  .full-list {
    margin-top: 10px;
    max-height: 340px;
    overflow-y: auto;
    border: 1px solid var(--rule);
    padding: 10px 12px;
  }
  .item-row {
    display: flex;
    gap: 10px;
    align-items: center;
    font-size: 12px;
    line-height: 1.9;
  }
  .item-row.is-sent { opacity: 0.4; }
  .item-row.is-sent .q-when { color: var(--ink-dim); }
  .item-row .what { flex: 1; }
  .mini-btn {
    background: none;
    border: 1px solid var(--rule);
    color: var(--ink-dim);
    font-family: inherit;
    font-size: 9px;
    letter-spacing: 0.06em;
    padding: 2px 7px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .mini-btn:hover { border-color: var(--signal); color: var(--ink); }
  .paused-tag { color: #c9a227; }
  .pace-line {
    font-size: 11px;
    color: var(--ink-dim);
    margin: 0 0 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .pace-btns { display: inline-flex; gap: 6px; }
  .health-line {
    font-size: 11px;
    color: var(--ink-dim);
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--rule);
  }
  .feed-row {
    display: flex;
    gap: 10px;
    align-items: baseline;
    font-size: 12px;
    line-height: 2;
  }
  .feed-row.feed-paused { opacity: 0.4; }
  .feed-when {
    flex-shrink: 0;
    width: 84px;
    color: var(--signal-dim);
  }
  .feed-row .what { flex: 1; color: var(--ink); }
  .feed-chain {
    flex-shrink: 0;
    font-size: 9px;
    letter-spacing: 0.08em;
    color: var(--ink-dim);
    border: 1px solid var(--rule);
    padding: 1px 5px;
  }
  .vtl {
    border-left: 1px solid var(--ink-dim);
    margin-left: 5px;
    padding: 6px 0 2px;
    max-height: 68vh;
    overflow-y: auto;
    overscroll-behavior: contain;
  }
  .vt-day {
    position: relative;
    margin: 20px 0 10px 12px;
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--signal);
    background: var(--paper-raised);
    border: 1px solid var(--signal-dim);
    padding: 4px 10px;
  }
  .vt-day::before {
    content: '';
    position: absolute;
    left: -13px;
    top: 50%;
    width: 12px;
    height: 1px;
    background: var(--signal-dim);
  }
  .vt-seg {
    position: relative;
    margin: 0;
  }
  .vt-seg .vt-dot {
    position: absolute;
    left: -4px;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--signal);
    border: 1px solid var(--paper);
  }
  .vt-lead-h, .vt-lead-v {
    position: absolute;
    background: #55503f;
  }
  .vt-lead-h { height: 1px; }
  .vt-lead-v { width: 1px; }
  .vt-seg .vt-body {
    position: absolute;
    font-size: 12px;
    line-height: 1.5;
    right: 0;
  }
  .vt-chain {
    font-weight: 700;
    color: var(--ink);
    letter-spacing: 0.03em;
  }
  .vt-label { color: var(--ink-dim); }
  .vt-chain::after { content: ' \2014 '; color: var(--ink-dim); font-weight: 400; }
  .vt-time {
    display: block;
    font-size: 10px;
    color: var(--signal-dim);
    letter-spacing: 0.04em;
  }
  .vt-item.feed-paused { opacity: 0.4; }
  .tl-wrap {
    max-width: 640px;
    margin: 22px auto 0;
    padding: 0 16px;
  }
  .tl-header {
    font-size: 10px;
    letter-spacing: 0.14em;
    color: var(--ink-dim);
    margin-bottom: 10px;
  }
  .tl-body {
    position: relative;
    padding-top: 18px;
    border-top: 1px solid var(--rule);
  }
  .tl-ticks { position: absolute; top: 0; left: 96px; right: 0; height: 100%; }
  .tl-tick { position: absolute; top: 0; height: 100%; }
  .tl-tick-line { width: 1px; height: 100%; background: var(--rule); opacity: 0.55; }
  .tl-tick-label {
    position: absolute;
    top: -14px;
    left: 2px;
    font-size: 9px;
    color: var(--ink-dim);
    letter-spacing: 0.06em;
  }
  .tl-row {
    display: flex;
    align-items: center;
    margin: 12px 0;
    position: relative;
    z-index: 1;
  }
  .tl-name {
    width: 96px;
    flex-shrink: 0;
    font-size: 11px;
    color: var(--ink);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    padding-right: 8px;
  }
  .tl-track { flex: 1; position: relative; height: 14px; }
  .tl-bar {
    height: 100%;
    background: var(--signal-dim);
    position: relative;
    overflow: hidden;
    min-width: 2%;
  }
  .tl-bar-done { height: 100%; background: var(--signal); }
  .tl-bar.tl-unstarted {
    background: none;
    border: 1px dashed var(--rule);
  }
  .tl-bar.tl-paused { opacity: 0.45; }
  .tl-bar.tl-overflow {
    -webkit-mask-image: linear-gradient(to right, black 82%, transparent 99%);
    mask-image: linear-gradient(to right, black 82%, transparent 99%);
  }
  .tl-finish-in {
    right: 4px;
    left: auto !important;
    color: var(--ink);
    text-shadow: 0 0 4px rgba(0,0,0,0.7);
  }
  .tl-tick.tl-major .tl-tick-line { opacity: 1; background: var(--ink-dim); }
  .tl-tick.tl-major .tl-tick-label { color: var(--ink); }
  .tl-finish {
    position: absolute;
    top: 0;
    font-size: 9px;
    color: var(--ink-dim);
    line-height: 14px;
    white-space: nowrap;
  }
</style>
</head>
<body>
  <header>
    <h1><span class="dot" aria-hidden="true"></span>DISPATCH</h1>
    <p id="asOf">reading current state&hellip;</p>
  </header>
  <div id="timeline"></div>
  <div id="feed"></div>
  <main id="main">
    <div class="empty-note" style="padding:20px 0;">Loading&hellip;</div>
  </main>
  <div class="refresh-line">
    <button onclick="load()">refresh</button>
  </div>

<script>
function fmtWhen(iso) {
  if (!iso) return null;
  const d = new Date(iso);
  const now = new Date();
  const diffMs = d - now;
  const diffDays = Math.round(diffMs / 86400000);
  const dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  const timeStr = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  let rel = '';
  if (diffMs > 0) {
    if (diffDays === 0) rel = 'today';
    else if (diffDays === 1) rel = 'tomorrow';
    else rel = `in ${diffDays} days`;
  } else {
    rel = 'overdue';
  }
  return `${dateStr}, ${timeStr} (${rel})`;
}

function fmtHistoryWhen(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month: '2-digit', day: '2-digit', year: '2-digit' });
}

let DRIPS = [];

/**
 * One horizontal strip: today -> the latest estimated finish across all
 * chains, with month ticks, and a bar per drip showing how far into the
 * future it runs. Started chains anchor at today and run to their
 * finishAt; not-started chains render as a dashed bar of their total
 * length (anchored at today only because there's nothing else to anchor
 * to yet).
 */
/**
 * The "what do my next few weeks look like" view: every projected send
 * across all three chains, merged and sorted by date, capped to the
 * next 21 days. Dates are exact for Dionaea, estimates for the other
 * two. Also a one-line health check: when anything last actually sent.
 */
function renderFeed(drips) {
  const el = document.getElementById('feed');
  const now = Date.now();
  const DAY = 86400000;
  const HORIZON = 183 * DAY; // ~6 months; the feed scrolls

  // health: most recent real send across all chains
  let lastSend = null;
  drips.forEach((d) => {
    (d.history || []).forEach((h) => {
      if (!lastSend || new Date(h.at) > new Date(lastSend.at)) {
        lastSend = { ...h, chain: d.name };
      }
    });
  });
  let healthHtml;
  if (lastSend) {
    const daysAgo = Math.floor((now - new Date(lastSend.at)) / DAY);
    const ago = daysAgo === 0 ? 'today' : daysAgo === 1 ? 'yesterday' : `${daysAgo} days ago`;
    healthHtml = `<div class="health-line">last send: ${escapeHtml(lastSend.label || '')} <span class="feed-chain">${escapeHtml(lastSend.chain)}</span> \u00b7 ${ago}</div>`;
  } else {
    healthHtml = `<div class="health-line">nothing has been sent yet</div>`;
  }

  const upcoming = [];
  drips.forEach((d) => {
    (d.items || []).forEach((i) => {
      if (i.sent || !i.at) return;
      const t = new Date(i.at).getTime();
      if (t - now <= HORIZON) {
        upcoming.push({
          at: i.at, label: i.label, chain: d.name, paused: d.paused,
          exact: d.endpoint === 'dionaea-daily-check',
        });
      }
    });
  });
  upcoming.sort((a, b) => new Date(a.at) - new Date(b.at));

  // group by calendar day
  const days = [];
  upcoming.slice(0, 400).forEach((u) => {
    const d = new Date(u.at);
    const key = d.toDateString();
    let g = days[days.length - 1];
    if (!g || g.key !== key) {
      g = { key, date: d, items: [] };
      days.push(g);
    }
    g.items.push(u);
  });

  // Each day is a segment of the spine, scaled to the clock: 24h of
  // day = DAY_H px, so a 9 AM dot sits higher in the segment than a
  // 9 PM one. Labels can't overlap, so when two sends land close
  // together the later label is pushed down and its leader line
  // extends (a little elbow) from the dot to wherever the label
  // actually ended up.
  const DAY_H = 144;        // 6px per hour
  const LABEL_H = 40;       // two-line label + breathing room
  const LABEL_X = 30;       // where label text starts, right of spine

  const dayHtml = days.map((g) => {
    // dot positions from time-of-day
    const entries = g.items.map((u) => {
      const d = new Date(u.at);
      const frac = (d.getHours() * 3600 + d.getMinutes() * 60) / 86400;
      return { ...u, dotY: Math.round(frac * DAY_H) };
    });

    // collision-resolve label positions top-down
    let prevBottom = -Infinity;
    entries.forEach((e) => {
      e.labelY = Math.max(e.dotY - 8, prevBottom + 6);
      prevBottom = e.labelY + LABEL_H - 6;
    });
    const segH = Math.max(DAY_H, prevBottom + 14);

    let displacedIdx = 0;
    const itemsHtml = entries.map((e) => {
      const time = new Date(e.at).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
      const displaced = e.labelY > e.dotY - 8 + 1;
      // leader: horizontal stub at dot; if displaced, add a vertical
      // drop + second stub reaching the label ("extend their lines").
      // Each displaced leader in a cluster drops at a different x, so
      // stacked lines stay visually separate instead of blending.
      let leader;
      if (displaced) {
        const elbowX = 12 + (displacedIdx % 4) * 7;
        displacedIdx += 1;
        const elbowY = e.labelY + 10;
        leader = `<span class="vt-lead-h" style="top:${e.dotY}px;left:4px;width:${elbowX - 4}px;"></span>`;
        leader += `<span class="vt-lead-v" style="top:${e.dotY}px;left:${elbowX}px;height:${elbowY - e.dotY}px;"></span>`;
        leader += `<span class="vt-lead-h" style="top:${elbowY}px;left:${elbowX}px;width:${LABEL_X - elbowX - 2}px;"></span>`;
      } else {
        displacedIdx = 0;
        leader = `<span class="vt-lead-h" style="top:${e.dotY}px;left:4px;width:${LABEL_X - 6}px;"></span>`;
      }
      return `
        <span class="vt-dot" style="top:${e.dotY - 3}px;" aria-hidden="true"></span>
        ${leader}
        <div class="vt-body${e.paused ? ' feed-paused' : ''}" style="top:${e.labelY}px;left:${LABEL_X}px;">
          <span class="vt-chain">${escapeHtml(e.chain)}</span>
          <span class="vt-label">${escapeHtml(e.label || '')}</span>
          <span class="vt-time">${e.exact ? '' : '~'}${time}</span>
        </div>`;
    }).join('');

    const dayLabel = g.date.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
    return `
      <div class="vt-day">${dayLabel}</div>
      <div class="vt-seg" style="height:${segH}px;">${itemsHtml}</div>`;
  }).join('');

  el.innerHTML = `
    <div class="tl-wrap">
      <div class="tl-header">UPCOMING &middot; 6 MONTHS</div>
      ${healthHtml}
      <div class="vtl">${dayHtml || '<div class="empty-note">nothing scheduled in the next 3 weeks</div>'}</div>
    </div>`;
}

function renderTimeline(drips) {
  const el = document.getElementById('timeline');
  const now = Date.now();
  const DAY = 86400000;

  const spans = drips.map((d) => {
    let days = null;
    if (d.started && d.duration && d.duration.finishAt) {
      days = Math.max((new Date(d.duration.finishAt) - now) / DAY, 1);
    } else if (d.duration && d.duration.totalDays != null) {
      days = d.duration.totalDays;
    }
    return { drip: d, days };
  }).filter((s) => s.days != null);

  if (!spans.length) { el.innerHTML = ''; return; }

  // ---- window: fit the SHORTER chains readably; anything much longer
  // than the rest just runs off the right edge with an arrow, instead of
  // flattening everything else into slivers (SCP alone is ~7 years).
  const sorted = spans.map((s) => s.days).sort((a, b) => b - a);
  const second = sorted.length > 1 ? sorted[1] : sorted[0];
  // Cap the window at one year -- beyond that the strip stops being a
  // planning tool. Longer chains run off the right edge with an arrow.
  const windowDays = Math.min(Math.max(Math.min(sorted[0], second * 1.2), 120) * 1.04, 365);

  // ---- adaptive ticks: monthly / quarterly / yearly by window width,
  // so labels never smear into each other on long windows.
  const stepMonths = windowDays <= 400 ? 1 : windowDays <= 1100 ? 3 : 12;
  const ticks = [];
  const t = new Date(now);
  t.setDate(1);
  t.setMonth(t.getMonth() + 1);
  while (stepMonths > 1 && t.getMonth() % stepMonths !== 0) t.setMonth(t.getMonth() + 1);
  while ((t - now) / DAY < windowDays) {
    const isJan = t.getMonth() === 0;
    const label = (isJan || stepMonths === 12)
      ? "Jan '" + String(t.getFullYear()).slice(2)
      : t.toLocaleDateString('en-US', { month: 'short' });
    ticks.push({ pct: ((t - now) / DAY / windowDays) * 100, label, major: isJan });
    t.setMonth(t.getMonth() + stepMonths);
  }

  const ticksHtml = ticks.map((tk) => `
    <div class="tl-tick${tk.major ? ' tl-major' : ''}" style="left:${tk.pct}%">
      <div class="tl-tick-line"></div>
      <div class="tl-tick-label">${tk.label}</div>
    </div>`).join('');

  const fmtFinish = (iso) => {
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { month: 'short' }) + " '" + String(d.getFullYear()).slice(2);
  };

  const rowsHtml = spans.map((s) => {
    const overflow = s.days > windowDays;
    const pct = overflow ? 100 : (s.days / windowDays) * 100;
    const donePct = s.drip.total > 0 ? Math.round((s.drip.sent / s.drip.total) * 100) : 0;
    let cls = 'tl-bar';
    if (!s.drip.started) cls += ' tl-unstarted';
    else if (s.drip.paused) cls += ' tl-paused';
    if (overflow) cls += ' tl-overflow';

    const finishTxt = s.drip.started && s.drip.duration.finishAt
      ? fmtFinish(s.drip.duration.finishAt)
      : '~' + Math.round(s.days) + 'd';
    const label = overflow ? '&rarr; ' + finishTxt : finishTxt;

    // overflow bars: label pinned inside the right edge; normal bars:
    // label floats just past the bar end (clamped so it stays on screen)
    const labelHtml = overflow
      ? `<span class="tl-finish tl-finish-in">${label}</span>`
      : `<span class="tl-finish" style="left:${Math.min(pct + 1.5, 80)}%">${label}</span>`;

    return `
      <div class="tl-row">
        <div class="tl-name">${escapeHtml(s.drip.name)}</div>
        <div class="tl-track">
          <div class="${cls}" style="width:${pct}%">
            <div class="tl-bar-done" style="width:${donePct}%"></div>
          </div>
          ${labelHtml}
        </div>
      </div>`;
  }).join('');

  el.innerHTML = `
    <div class="tl-wrap">
      <div class="tl-header">TIMELINE <span class="est-tag">est.</span></div>
      <div class="tl-body">
        <div class="tl-ticks">${ticksHtml}</div>
        ${rowsHtml}
      </div>
    </div>`;
}

function renderCard(drip) {
  const pct = drip.total > 0 ? Math.round((drip.sent / drip.total) * 100) : 0;
  const nextHtml = drip.next
    ? `<div class="next"><span class="label">next: </span>${drip.next.at ? fmtWhen(drip.next.at) : '(date unknown until started)'}</div>
       <div class="next-detail">${escapeHtml(drip.next.label || '')}</div>`
    : `<div class="next-detail" style="margin-bottom:14px;">${drip.started ? 'nothing left to send' : 'not started yet'}</div>`;

  const statusHtml = !drip.started
    ? `<span class="live-tag not-live">not started</span>`
    : drip.paused
      ? `<span class="live-tag paused-tag">paused</span>`
      : `<span class="live-tag"><span class="dot" aria-hidden="true"></span>live</span>`;

  const startBtnHtml = drip.started
    ? ''
    : `<button class="action-btn start-btn" data-endpoint="${drip.endpoint}" onclick="startDrip(this)">start chain</button>`;

  // ---- duration line ----
  let durationHtml = '';
  if (drip.duration) {
    const d = drip.duration;
    const bits = [];
    if (d.totalDays != null) {
      const months = d.totalDays / 30.4;
      bits.push(`whole chain: ~${Math.round(d.totalDays)} days${months >= 1.5 ? ` (~${months.toFixed(1)} months)` : ''}`);
    }
    if (d.remainingDays != null) bits.push(`~${Math.round(d.remainingDays)} days left`);
    if (d.finishAt) bits.push(`finishes around ${new Date(d.finishAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}`);
    if (d.note && !d.finishAt) bits.push(d.note);
    if (bits.length) {
      durationHtml = `<div class="duration-line">${escapeHtml(bits.join(' \u00b7 '))}${d.mode === 'estimate' ? ' <span class="est-tag">est.</span>' : ''}</div>`;
    }
  }

  // ---- pace control (only drips with a runtime gap: SCP, Ong's Hat) ----
  let paceHtml = '';
  if (drip.gap) {
    const avg = ((drip.gap.min + drip.gap.max) / 2).toFixed(1);
    paceHtml = `
      <div class="pace-line">
        pace: ${drip.gap.min}\u2013${drip.gap.max} day gaps (~${avg} avg)${drip.gap.overridden ? ' <span class="est-tag">custom</span>' : ''}
        <span class="pace-btns">
          <button class="mini-btn" onclick="setPace('${drip.endpoint}', 'faster')">faster</button>
          <button class="mini-btn" onclick="setPace('${drip.endpoint}', 'slower')">slower</button>
          ${drip.gap.overridden ? `<button class="mini-btn" onclick="setPace('${drip.endpoint}', 'default')">reset</button>` : ''}
        </span>
      </div>`;
  }

  // ---- upcoming queue: next 5 unsent ----
  const upcoming = (drip.items || []).filter((i) => !i.sent).slice(0, 5);
  const upcomingHtml = upcoming.length
    ? `<div class="queue">
        <div class="history-title">UP NEXT</div>
        ${upcoming.map((i, idx) => `
          <div class="queue-row${idx === 0 ? ' first' : ''}">
            <span class="q-when">${i.at ? fmtQueueWhen(i.at) : '--'}</span>
            <span class="what">${escapeHtml(i.label || '')}</span>
          </div>`).join('')}
       </div>`
    : '';

  // ---- sent history (real send log) ----
  const historyHtml = drip.history && drip.history.length
    ? drip.history.map(h => `
        <div class="history-row">
          <span class="when">${fmtHistoryWhen(h.at)}</span>
          <span class="what">${escapeHtml(h.label || '')}</span>
        </div>`).join('')
    : `<div class="empty-note">nothing sent yet</div>`;

  // ---- full item list (collapsed by default) ----
  const fullListHtml = `
    <div class="full-list-toggle">
      <button class="action-btn" onclick="toggleFullList('${drip.endpoint}')">
        <span id="toggle-label-${drip.endpoint}">show all ${drip.total} items</span>
      </button>
    </div>
    <div class="full-list" id="full-list-${drip.endpoint}" style="display:none;"></div>`;

  return `
    <div class="card">
      <div class="card-head">
        <h2>${escapeHtml(drip.name)}</h2>
        <span class="count"><b>${drip.sent}</b> / ${drip.total}</span>
      </div>
      <div class="meter"><div class="meter-fill" style="width:${pct}%"></div></div>
      ${statusHtml}
      ${nextHtml}
      ${durationHtml}
      ${paceHtml}
      <div class="actions">
        <button class="action-btn" data-endpoint="${drip.endpoint}" onclick="testDrip(this)">test next</button>
        ${drip.started ? `<button class="action-btn" data-endpoint="${drip.endpoint}" onclick="sendNow(this)">send now</button>` : ''}
        ${drip.started ? `<button class="action-btn ${drip.paused ? 'start-btn' : ''}" data-endpoint="${drip.endpoint}" data-paused="${drip.paused ? '1' : ''}" onclick="togglePause(this)">${drip.paused ? 'resume' : 'pause'}</button>` : ''}
        ${startBtnHtml}
      </div>
      <div class="action-result" id="result-${drip.endpoint}"></div>
      ${upcomingHtml}
      <div class="history">
        <div class="history-title">SENT</div>
        ${historyHtml}
      </div>
      ${fullListHtml}
    </div>`;
}

// Queue rows show date-only (estimates aren't precise to the hour anyway)
function fmtQueueWhen(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function toggleFullList(endpoint) {
  const listEl = document.getElementById('full-list-' + endpoint);
  const labelEl = document.getElementById('toggle-label-' + endpoint);
  const drip = DRIPS.find((d) => d.endpoint === endpoint);
  if (!drip) return;

  if (listEl.style.display === 'none') {
    // Render on first open (203 rows for Ong's Hat -- don't build until asked)
    if (!listEl.dataset.rendered) {
      listEl.innerHTML = (drip.items || []).map((i) => `
        <div class="item-row ${i.sent ? 'is-sent' : ''}">
          <span class="q-when">${i.sent ? 'sent' : (i.at ? fmtQueueWhen(i.at) : '--')}</span>
          <span class="what">${escapeHtml(i.label || '')}</span>
          ${!i.sent && !drip.started ? `<button class="mini-btn" onclick="jumpTo('${endpoint}', '${String(i.key).replace(/'/g, "\\'")}', this)">start here</button>` : ''}
        </div>`).join('');
      listEl.dataset.rendered = '1';
    }
    listEl.style.display = 'block';
    labelEl.textContent = 'hide list';
  } else {
    listEl.style.display = 'none';
    labelEl.textContent = `show all ${drip.total} items`;
  }
}

async function jumpTo(endpoint, key, btn) {
  if (!confirm('Start from this item? Everything before it will be marked as already sent and will never arrive.')) return;
  btn.disabled = true;
  btn.textContent = '\u2026';
  const resultEl = document.getElementById('result-' + endpoint);
  try {
    const res = await fetch(`/.netlify/functions/${endpoint}?jump_to=${encodeURIComponent(key)}`);
    const text = await res.text();
    resultEl.textContent = text;
    resultEl.className = 'action-result ok';
    setTimeout(load, 1200);
  } catch (err) {
    resultEl.textContent = 'Failed: ' + err.message;
    resultEl.className = 'action-result err';
    btn.disabled = false;
    btn.textContent = 'start here';
  }
}

async function testDrip(btn) {
  const endpoint = btn.dataset.endpoint;
  const resultEl = document.getElementById('result-' + endpoint);
  btn.disabled = true;
  btn.textContent = 'sending\u2026';
  resultEl.textContent = '';
  try {
    const res = await fetch(`/.netlify/functions/${endpoint}?test_next=1`);
    const text = await res.text();
    resultEl.textContent = text;
    resultEl.className = 'action-result ok';
  } catch (err) {
    resultEl.textContent = 'Failed: ' + err.message;
    resultEl.className = 'action-result err';
  }
  btn.disabled = false;
  btn.textContent = 'test next';
}

async function startDrip(btn) {
  const endpoint = btn.dataset.endpoint;
  const resultEl = document.getElementById('result-' + endpoint);
  if (!confirm('Start this chain for real? It will begin sending on its normal schedule from now on.')) return;
  btn.disabled = true;
  btn.textContent = 'starting\u2026';
  try {
    const res = await fetch(`/.netlify/functions/${endpoint}?start=1`);
    const text = await res.text();
    resultEl.textContent = text;
    resultEl.className = 'action-result ok';
    setTimeout(load, 1200);
  } catch (err) {
    resultEl.textContent = 'Failed: ' + err.message;
    resultEl.className = 'action-result err';
    btn.disabled = false;
    btn.textContent = 'start chain';
  }
}

async function sendNow(btn) {
  const endpoint = btn.dataset.endpoint;
  const resultEl = document.getElementById('result-' + endpoint);
  if (!confirm('Send the next item for REAL, right now? This counts -- it advances the chain.')) return;
  btn.disabled = true;
  btn.textContent = 'sending\u2026';
  try {
    const res = await fetch(`/.netlify/functions/${endpoint}?send_now=1`);
    const text = await res.text();
    resultEl.textContent = text;
    resultEl.className = 'action-result ok';
    setTimeout(load, 1200);
  } catch (err) {
    resultEl.textContent = 'Failed: ' + err.message;
    resultEl.className = 'action-result err';
    btn.disabled = false;
    btn.textContent = 'send now';
  }
}

async function togglePause(btn) {
  const endpoint = btn.dataset.endpoint;
  const resultEl = document.getElementById('result-' + endpoint);
  const isPaused = btn.dataset.paused === '1';
  const action = isPaused ? 'resume' : 'pause';
  btn.disabled = true;
  btn.textContent = '\u2026';
  try {
    const res = await fetch(`/.netlify/functions/${endpoint}?${action}=1`);
    const text = await res.text();
    resultEl.textContent = text;
    resultEl.className = 'action-result ok';
    setTimeout(load, 1200);
  } catch (err) {
    resultEl.textContent = 'Failed: ' + err.message;
    resultEl.className = 'action-result err';
    btn.disabled = false;
    btn.textContent = action;
  }
}

async function setPace(endpoint, mode) {
  const drip = DRIPS.find((d) => d.endpoint === endpoint);
  if (!drip || !drip.gap) return;
  const resultEl = document.getElementById('result-' + endpoint);
  let q;
  if (mode === 'default') {
    q = 'set_gap=default';
  } else {
    const f = mode === 'faster' ? 0.6 : 1.6;
    const clamp = (v) => Math.min(Math.max(Math.round(v * 100) / 100, 0.1), 45);
    const min = clamp(drip.gap.min * f);
    const max = clamp(Math.max(drip.gap.max * f, min));
    q = `set_gap=${min},${max}`;
  }
  try {
    const res = await fetch(`/.netlify/functions/${endpoint}?${q}`);
    const text = await res.text();
    resultEl.textContent = text;
    resultEl.className = 'action-result ok';
    setTimeout(load, 900);
  } catch (err) {
    resultEl.textContent = 'Failed: ' + err.message;
    resultEl.className = 'action-result err';
  }
}

function escapeHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

async function load() {
  const main = document.getElementById('main');
  const asOf = document.getElementById('asOf');
  asOf.textContent = 'reading current state\u2026';
  try {
    const res = await fetch('/.netlify/functions/status');
    if (!res.ok) throw new Error(`status ${res.status}`);
    const data = await res.json();
    main.innerHTML = data.drips.map(renderCard).join('');
    DRIPS = data.drips;
    renderTimeline(data.drips);
    renderFeed(data.drips);
    asOf.textContent = 'as of ' + new Date(data.generatedAt).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
  } catch (err) {
    main.innerHTML = `<div class="error-banner">Couldn't read status: ${escapeHtml(err.message)}</div>`;
    asOf.textContent = 'last attempt failed';
  }
}

load();
</script>

</html>
